name: centos7-conda

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build packed env in CentOS 7 container
        shell: bash
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            centos:7 \
            bash -lc '
              set -euo pipefail

              sed -i "s|^mirrorlist=|#mirrorlist=|g" /etc/yum.repos.d/CentOS-*.repo
              sed -i "s|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g" /etc/yum.repos.d/CentOS-*.repo
              yum clean all
              yum makecache

              yum install -y wget bzip2 tar which git ca-certificates gcc gcc-c++ make
              update-ca-trust

              wget -O /tmp/miniforge.sh https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh
              bash /tmp/miniforge.sh -b -p /opt/conda

              source /opt/conda/etc/profile.d/conda.sh
              conda config --set always_yes yes --set changeps1 no
              conda update -n base -c conda-forge conda

              conda create -y -n mokit-py311 python=3.11 mokit -c mokit -c conda-forge
              conda activate mokit-py311

              conda install -y mokit pyscf mpi4py openmpi conda-pack -c mokit -c conda-forge
              pip install block2-mpi
              pip install git+https://github.com/pyscf/dmrgscf

              PYSCFHOME=$(python -c "import os, pyscf; print(os.path.dirname(os.path.dirname(pyscf.__file__)))")

              wget -O /tmp/settings.py.example https://raw.githubusercontent.com/pyscf/dmrgscf/master/pyscf/dmrgscf/settings.py.example
              mv /tmp/settings.py.example "${PYSCFHOME}/pyscf/dmrgscf/settings.py"
              chmod +x ${PYSCFHOME}/pyscf/dmrgscf/nevpt_mpi.py

              ldd --version
              python -V
              python -c "import pyscf; import pyscf.dmrgscf; print(\"pyscf ok\")"

              conda-pack -n mokit-py311 -o /workspace/mokit-py311.tar.gz
              chmod 644 /workspace/mokit-py311.tar.gz
              ls -lh /workspace/mokit-py311.tar.gz
            '

      - name: Upload packed environment
        uses: actions/upload-artifact@v4
        with:
          name: mokit-py311-centos7
          path: ${{ github.workspace }}/mokit-py311.tar.gz
          if-no-files-found: error
